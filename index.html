<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>出席登録</title>

  <!-- QRライブラリ -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    #reader {
      width: 320px;
      margin: 20px auto;
    }

    #status {
      margin-top: 15px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<h1>📷 授業出席＆退席</h1>

<button onclick="startScan()">QR読み取り開始</button>

<div id="reader" style="display:none;"></div>

<p id="status"></p>

<br>
<footer align="center" style="font-size:12px">
  Copyright &copy; IWAKUNI Junior College. All Rights Reserved.
</footer>

<script>
const GAS_URL = "https://script.google.com/a/macros/iwakuni.ac.jp/s/AKfycbxBk1oqNj-BfVSSEPDEREj2blrjhg7JhibThYjLEXY5QPOooEQ1aSRuyF88KXhhGYXT/exec"; // ←ここ書き換え

let html5QrCode;

function startScan() {
  document.getElementById("reader").style.display = "block";

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" }, // 背面カメラ
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  );
}

function onScanSuccess(decodedText) {
  console.log("読み取り成功:", decodedText);

  // バイブ（対応デバイス）
  if (navigator.vibrate) navigator.vibrate(200);

  document.getElementById("status").innerText = "読み取り成功！";

  html5QrCode.stop();

  try {
    const url = new URL(decodedText);
    const subjectId = url.searchParams.get("subjectId");

    if (!subjectId) {
      document.getElementById("status").innerText = "QRエラー（subjectIdなし）";
      return;
    }

    document.getElementById("status").innerText =
      "出席登録中...";

    // ✅ GASへ遷移
    window.location.href =
      GAS_URL + "?subjectId=" + subjectId;

  } catch (e) {
    document.getElementById("status").innerText =
      "無効なQRコード";
  }
}

function onScanFailure(error) {
  // 無視（ログだけ）
  console.log("読み取り中...");
}
</script>

</body>
</html>
