<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>出席登録</title>

  <!-- QRライブラリ -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f4f6f8;
      padding: 10px;
      margin: 0;
    }

    h1 {
      color: #333;
      margin-top: 20px;
      font-size: 20px;
    }

    #reader {
      width: 100%;
      max-width: 350px;
      margin: 20px auto;
    }

    #status {
      margin-top: 15px;
      font-size: 16px;
      color: green;
    }

    button {
      width: 90%;
      max-width: 300px;
      padding: 14px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /* ✅ TESTバナー */
    #testBanner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: red;
      color: white;
      padding: 10px;
      font-weight: bold;
      text-align: center;
      z-index: 999;
    }

    
    /* ✅ スマホ専用微調整 */
    @media (max-width: 480px) {

      h1 {
        font-size: 18px;
      }

      button {
        font-size: 15px;
        padding: 12px;
      }

    }

  </style>
</head>

<body>

<div id="testBanner">⚠ TESTモード動作中</div>

<h1>📷 授業出席＆退席</h1>

<button onclick="startScan()">QR読み取り開始</button>

<div id="reader" style="display:none;"></div>

<p id="status"></p>

<br>

<div style="margin-top:20px;">
<button onclick="goHistory()">
  出席履歴を見る
</button>
</div>

<br><br>
<footer style="font-size:12px">
  Copyright &copy; IWAKUNI Junior College. All Rights Reserved.
</footer>

<script>
const GAS_URL = "https://script.google.com/a/macros/iwakuni.ac.jp/s/AKfycbxBk1oqNj-BfVSSEPDEREj2blrjhg7JhibThYjLEXY5QPOooEQ1aSRuyF88KXhhGYXT/exec";

let html5QrCode;


// ✅ ★ここに追加（カメラ許可のウォームアップ）
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    stream.getTracks().forEach(track => track.stop());
  })
  .catch(err => {
    console.log("カメラ許可が必要です");
  });

// ✅ TESTモード判定
const params = new URLSearchParams(window.location.search);
const isTest = params.get("test") === "1";

// ✅ TESTバナー表示
if (isTest) {
  document.getElementById("testBanner").style.display = "block";
}

function startScan() {
  document.getElementById("reader").style.display = "block";

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  );
}

function onScanSuccess(decodedText) {

  console.log("読み取り:", decodedText);

  if (navigator.vibrate) navigator.vibrate(200);

  document.getElementById("status").innerText = "読み取り成功！";

  html5QrCode.stop();

  try {
    // ✅ 変数名変更（重要！）
    const parsedUrl = new URL(decodedText);

    const subjectId = parsedUrl.searchParams.get("subjectId");

    if (!subjectId) {
      document.getElementById("status").innerText = "QRエラー（subjectIdなし）";
      return;
    }

    document.getElementById("status").innerText = "出席登録中...";

    // ✅ GAS送信URL生成
    let sendUrl = GAS_URL + "?subjectId=" + subjectId;

    // ✅ TESTモード引き継ぎ
    if (isTest) {
      sendUrl += "&test=1";
    }

    window.location.href = sendUrl;

  } catch (e) {
    document.getElementById("status").innerText = "無効なQRコード";
  }
}

function onScanFailure(error) {
  console.log("読み取り中...");
}

function goHistory() {

  let url = GAS_URL + "?page=history";

  // ✅ TESTモード引き継ぐ
  if (isTest) {
    url += "&test=1";
  }

  window.location.href = url;
}
</script>

</body>
</html>
